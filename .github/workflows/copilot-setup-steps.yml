name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install --no-install-recommends -y \
            cmake \
            libasound2-dev \
            libaudio-dev \
            libdbus-1-dev \
            libdecor-0-dev \
            libdrm-dev \
            libegl1-mesa-dev \
            libgbm-dev \
            libgles2-mesa-dev \
            libgl1-mesa-dev \
            libibus-1.0-dev \
            libjack-dev \
            libmbedtls-dev \
            libopenal-dev \
            libpipewire-0.3-dev \
            libpng-dev \
            libpulse-dev \
            libsndio-dev \
            libturbojpeg-dev \
            libudev-dev \
            liburing-dev \
            libuv1-dev \
            libvulkan-dev \
            libvorbis-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libxss-dev \
            libxtst-dev \
            libsqlite3-dev \
            pkg-config \
            wget

      - name: Install Haxe
        uses: krdlab/setup-haxe@v2
        with:
          haxe-version: latest

      - name: Configure haxelib
        run: |
          haxelib setup ~/haxelib
          haxelib install hashlink

      - name: Build and install SDL3
        run: |
          wget https://github.com/libsdl-org/SDL/releases/download/release-3.4.10/SDL3-3.4.10.tar.gz
          tar -xzvf SDL3-3.4.10.tar.gz
          cd SDL3-3.4.10/
          mkdir build
          cd build
          cmake ..
          make
          sudo make install

      - name: Build and install HashLink
        run: |
          make
          sudo make install
          sudo ldconfig
